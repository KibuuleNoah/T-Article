<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <title>t-article</title>

    <style>
      :root {
        /* YOUR BRAND COLOR */
        --primary-color: oklch(63.05% 0.112 227.4);

        /* DARK THEME SYSTEM */

        --bg-main: oklch(22.09% 0.033 227.4);
        --bg-card: oklch(33.41% 0.055 227.4); /* Card surface */
        --text-main: #f8fafc; /* Light text */
        --text-muted: #94a3b8; /* Dimmed text */
        --border-color: #334155; /* Card borders */
        --border-radius: 12px;
      }

      body {
        background-color: var(--bg-main);
        color: var(--text-main);
      }

      .article-card {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        color: var(--text-main);
      }

      .tag-badge {
        background-color: #ffffff;
        color: var(--primary-color);
      }

      .border-top {
        border-top-color: var(--border-color) !important;
      }

      .article-meta {
        color: var(--text-muted);
      }
    </style>
  </head>
  <body data-bs-theme="dark">
    <div id="root"></div>

    <script src="//cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      eruda.init();
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
      integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
